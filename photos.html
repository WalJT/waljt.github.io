  <style>
    /* Simple styles specific to the photos page */
    /* Layout: use flex so cards can have intrinsic widths calculated from aspect-ratio */
    .photos-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 18px;
      align-items: flex-start;

    .photo-card {
      height: 220px;

      border: 1px solid rgba(255, 255, 255, 0.02);
      border-radius: 10px;
      overflow: hidden;
      aspect-ratio: auto;
    }

    .photos-hero {
      margin-bottom: 14px;
    }
  </style>
</head>
